{% extends "base.html" %}
{% block title %}Şifre Değiştir - FBU Downtime Monitor{% endblock %}
{% block content %}
<div class="page-center">
    <div class="card" style="max-width:400px;width:100%;">
        <div class="card-header">Şifre Değiştir</div>
        <div class="card-body">
            {% if user.must_change_password %}
            <p style="margin-bottom:16px;color:var(--text-muted);font-size:14px;">İlk girişte şifrenizi değiştirmeniz gerekmektedir.</p>
            {% endif %}
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="post" action="/change-password">
                <label class="form-label">Yeni Şifre</label>
                <input type="password" class="form-input" name="new_password" required minlength="6">
                <label class="form-label" style="margin-top:12px;">Şifre Tekrar</label>
                <input type="password" class="form-input" name="confirm_password" required minlength="6">
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">Şifreyi Güncelle</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
